<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramiza Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#111;color:white;}

/* NAVBAR */
nav{
position:fixed;
width:100%;
top:0;
background:#000;
display:flex;
justify-content:space-between;
padding:15px 30px;
z-index:1000;
}

nav a{color:white;margin-left:15px;text-decoration:none;}
nav a:hover{color:#d4af37;}

/* HEADER */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),url('https://imgur.com/sEu0Gg3.jpg') center/cover;
}

/* LOGO ROND */
.logo{
width:200px;
border-radius:50%;
border:3px solid #d4af37;
margin-bottom:20px;
}

h1{color:#d4af37;font-size:40px;}
.btn{
background:#d4af37;
color:black;
padding:10px 25px;
margin-top:20px;
text-decoration:none;
border-radius:30px;
}

/* MOBILE */
@media(max-width:768px){
nav{flex-direction:column;}
h1{font-size:28px;}
.logo{width:140px;}
}

/* SECTION */
section{padding:80px 20px;text-align:center;}

/* FORM */
form input, form textarea{
width:90%;
max-width:400px;
margin:10px;
padding:10px;
border:none;
border-radius:5px;
}

form button{
background:#d4af37;
border:none;
padding:10px 20px;
}

/* FOOTER */
footer{background:#000;padding:20px;text-align:center;}
</style>
</head>

<body>

<nav>
<div>Ramiza Group Offial Site web</div>
<div>
<a href="#home">Accueil</a>
<a href="#contact">Contact</a>
<a href="#pay">Paiement</a>
</div>
</nav>

<header id="home">
<img src="https://imgur.com/4AVWFEW.png" class="logo">
<h1>Ramiza Group™</h1>
<p>Business & Investissement</p>
</header>

<!-- CONTACT -->
<section id="contact">
<h2 style="color:#d4af37;">Contact</h2>

<form action="https://formspree.io/f/TON_ID" method="POST">
<input type="text" name="name" placeholder="Nom" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<br>
<button type="submit">Envoyer</button>
</form>

<p>Email : ramizacompany@gmail.com</p>
</section>

<!-- PAIEMENT -->
<section id="pay">
<h2 style="color:#d4af37;">Paiement</h2>

<a href="https://www.paypal.com/paypalme/TONUSERNAME" class="btn">
Payer maintenant
</a>
</section>

<footer>
© 2026 Ramiza Group
</footer>

</body>
</html>
